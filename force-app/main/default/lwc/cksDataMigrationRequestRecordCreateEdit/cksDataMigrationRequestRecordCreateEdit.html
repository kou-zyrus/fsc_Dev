<template>
    <template lwc:if={isLoading}>
        <div>
            <lightning-spinner alternative-text="Loading" size="large" variant="brand"></lightning-spinner>
        </div>
    </template>

    <lightning-record-edit-form
        object-api-name="DataMigrationRequest__c"
        record-id={formRecordId}
        onsubmit={handleSubmit}
        onerror={handleError}
        onsuccess={handleSuccess}
    >
        <lightning-modal-header label={headerLabel}></lightning-modal-header>

        <lightning-modal-body class={modalBodyClass}>
            <div class={modalContentClass}>
                <lightning-messages></lightning-messages>

                <lightning-accordion allow-multiple-sections-open active-section-name={activeSections}>
                    <lightning-accordion-section name="A" label="データ移行依頼の詳細">
                        <lightning-layout multiple-rows="true" vertical-align="center">
                            <lightning-layout-item padding="horizontal-small" size="6">
                                <lightning-input-field field-name="Name" value={fieldValues.Name}></lightning-input-field>
                            </lightning-layout-item>
                            <lightning-layout-item padding="horizontal-small" size="6"></lightning-layout-item>
                            <lightning-layout-item padding="horizontal-small" size="6">
                                <lightning-combobox
                                    label="移行種別"
                                    value={migrationTypeMasterId}
                                    options={migrationTypeMasterOptions}
                                    onchange={handleMigrationTypeChange}
                                    placeholder="選択してください"
                                    required>
                                </lightning-combobox>
                            </lightning-layout-item>
                            <lightning-layout-item padding="horizontal-small" size="6">
                                <lightning-input-field field-name="MigrationDate__c" value={fieldValues.MigrationDate__c} onchange={handleDateChange}></lightning-input-field>
                            </lightning-layout-item>
                            <lightning-layout-item padding="horizontal-small" size="6">
                                <lightning-input-field field-name="AssociateCode__c" value={fieldValues.AssociateCode__c}></lightning-input-field>
                            </lightning-layout-item>
                            <template lwc:if={visibility.migrationAssociateCode}>
                                <lightning-layout-item padding="horizontal-small" size="6">
                                    <lightning-input-field field-name="MigrationAssociateCode__c" value={fieldValues.MigrationAssociateCode__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={scheduleSteps.hasSchedule}>
                                <lightning-layout-item size="12" padding="around-small">
                                    <div style="border:1px solid #d8dde6; border-radius:8px; background:#f8fbff; padding:12px;">
                                        <p style="font-weight:700; margin-bottom:8px;">簡易スケジュール(目安)</p>
                                        <div style="display:flex; flex-wrap:nowrap; align-items:stretch; overflow-x:auto; padding-bottom:4px;" role="list" aria-label="簡易スケジュール">
                                            <template for:each={scheduleSteps.steps} for:item="step">
                                                <div key={step.id} class={step.itemClass} role="listitem" style={step.itemStyle}>
                                                    <p style="font-size:12px; color:#31465d; margin-bottom:2px; line-height:1.2;">{step.deadlineLabel}</p>
                                                    <p style="font-size:13px; font-weight:700; color:#1f2d3d; margin-bottom:2px; line-height:1.3;">{step.label}</p>
                                                    <p style="font-size:12px; color:#425b76; line-height:1.2;">{step.dateLabel}</p>
                                                    <template lwc:if={step.hasOutputs}>
                                                        <p style="font-size:11px; font-weight:700; color:#31465d; margin-top:4px; margin-bottom:1px; line-height:1.2;">アウトプット</p>
                                                        <template for:each={step.outputs} for:item="output">
                                                            <p key={output.id} style="font-size:11px; color:#31465d; margin:0; line-height:1.3;">・{output.text}</p>
                                                        </template>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </lightning-layout-item>
                            </template>
                        </lightning-layout>
                    </lightning-accordion-section>

                    <lightning-accordion-section name="B" label="移行対象データ(オブジェクト)">
                        <lightning-layout multiple-rows="true" vertical-align="center">
                            <template lwc:if={showBlankRowsInSectionB}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <div style="height:200px;"></div>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={sectionBVisible}>
                            <template lwc:if={visibility.existingContractCustomerNotes}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="ExistingContractCustomerNotes__c" value={fieldValues.ExistingContractCustomerNotes__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.individual}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="Individual__c" value={fieldValues.Individual__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.masterGroupCustomerNotes}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="MasterGroupCustomerNotes__c" value={fieldValues.MasterGroupCustomerNotes__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.childGroup}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="ChildGroup__c" value={fieldValues.ChildGroup__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.user}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="User__c" value={fieldValues.User__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.recordTypeMaster}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="RecordTypeMaster__c" value={fieldValues.RecordTypeMaster__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.associateBranchMaster}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="AssociateBranchMaster__c" value={fieldValues.AssociateBranchMaster__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.masterGroup}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="MasterGroup__c" value={fieldValues.MasterGroup__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.childGroupOnly}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="ChildGroupOnly__c" value={fieldValues.ChildGroupOnly__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.household}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="Household__c" value={fieldValues.Household__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.individualOnly}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="IndividualOnly__c" value={fieldValues.IndividualOnly__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.existingContract}>
                                <lightning-layout-item padding="horizontal-small" size="12">

                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.clientClassificationMaster}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="ClientClassificationMaster__c" value={fieldValues.ClientClassificationMaster__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.customerNotes}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="CustomerNotes__c" value={fieldValues.CustomerNotes__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.relative}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="Relative__c" value={fieldValues.Relative__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.accountContactRelation}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="AccountContactRelation__c" value={fieldValues.AccountContactRelation__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.campaignOnly}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="CampaignOnly__c" value={fieldValues.CampaignOnly__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.campaignMember}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="CampaignMember__c" value={fieldValues.CampaignMember__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.campaign}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="Campaign__c" value={fieldValues.Campaign__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.otherCompany}>
                                <lightning-layout-item padding="horizontal-small" size="12">

                            </template>
                            <template lwc:if={visibility.ownCompany}>

                            </template>
                            <template lwc:if={visibility.riderOwnCompany}>

                            <template lwc:if={visibility.riderOtherCompany}>

                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.incomingChannelLeadsMaster}>
                                <lightning-layout-item padding="horizontal-small" size="12">

                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.opportunity}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="Opportunity__c" value={fieldValues.Opportunity__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.opportunityInsurancePolicyAssociation}>

                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.designDocument}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="DesignDocument__c" value={fieldValues.DesignDocument__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.graspIntention}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="GraspIntention__c" value={fieldValues.GraspIntention__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.comparisonRecommendedProduct}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="ComparisonRecommendedProduct__c" value={fieldValues.ComparisonRecommendedProduct__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.bringOut}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="BringOut__c" value={fieldValues.BringOut__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.shipping}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="Shipping__c" value={fieldValues.Shipping__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.receipt}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="Receipt__c" value={fieldValues.Receipt__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.storage}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="Storage__c" value={fieldValues.Storage__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.personalInformationHandling}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="PersonalInformationHandling__c" value={fieldValues.PersonalInformationHandling__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.dailyReport}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="DailyReport__c" value={fieldValues.DailyReport__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.contactClassMaster}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="ContactClassMaster__c" value={fieldValues.ContactClassMaster__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.event}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="Event__c" value={fieldValues.Event__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.texttemplate}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="Texttemplate__c" value={fieldValues.Texttemplate__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.task}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="Task__c" value={fieldValues.Task__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.attachmentDoc}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="AttachmentDoc__c" value={fieldValues.AttachmentDoc__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.planningTargetClassification}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="PlanningTargetClassification__c" value={fieldValues.PlanningTargetClassification__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.agencyContactMaster}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="AgencyContactMaster__c" value={fieldValues.AgencyContactMaster__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.targetManagement}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="TargetManagement__c" value={fieldValues.TargetManagement__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.contact}>
                                <lightning-layout-item padding="horizontal-small" size="12">
                                    <lightning-input-field field-name="Contact__c" value={fieldValues.Contact__c}></lightning-input-field>
                                </lightning-layout-item>
                            </template>
                            <template lwc:if={visibility.status}>

        <lightning-modal-footer>

            </lightning-layout>
