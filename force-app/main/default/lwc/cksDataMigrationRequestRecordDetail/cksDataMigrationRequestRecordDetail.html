<template>
    <!-- 　ローディング表示    -->
    <template lwc:if={isLoading}>
        <div>
            <lightning-spinner alternative-text="Loading" size="large" variant="brand"></lightning-spinner>
        </div>
    </template>
    <!-- エラー表示領域 -->
    <!-- <c-dgk-error-toast errors={error}></c-dgk-error-toast> -->
    <!-- 削除フラグがFALSEの時に表示 -->
    <template lwc:if={displayAll}>
        <lightning-record-edit-form
            record-id={recordId}
            object-api-name="DataMigrationRequest__c"
            onsubmit={handleSubmit}
        >
            <!--　ボタンエリア -->
            <lightning-layout horizontal-align="center">
                <lightning-layout-item padding="horizontal-small">
                    <lightning-button name="edit" label="編集" onclick={handleClick} disabled={disabled}></lightning-button>
                </lightning-layout-item>
                <lightning-layout-item padding="horizontal-small">
                    <lightning-button name="delete" label="削除" onclick={handleClick} disabled={disabled}></lightning-button>
                </lightning-layout-item>
                <lightning-layout-item padding="horizontal-small">
                    <lightning-button name="copy" label="コピー" onclick={handleClick} disabled={disabled}></lightning-button>
                </lightning-layout-item>
            </lightning-layout>

            <!--　ユーザー向け入力チェックエラー表示領域-->
            <!-- <template lwc:if={errorMessages}>
                <c-dgk-user-error-panel messages={errorMessages}></c-dgk-user-error-panel>
            </template> -->

            <lightning-accordion allow-multiple-sections-open active-section-name={internalActiveSections}>
                <lightning-accordion-section name="A" label="データ移行依頼の詳細">
                    <lightning-layout multiple-rows="true">
                        <lightning-layout-item class="section-a-item" padding="horizontal-small" size="12">
                            <lightning-output-field field-name="Name" variant="standard"></lightning-output-field>
                        </lightning-layout-item>
                        <lightning-layout-item class="section-a-item" padding="horizontal-small" size="6">
                            <lightning-output-field field-name="MigrationType__c" variant="standard"></lightning-output-field>
                        </lightning-layout-item>
                        <lightning-layout-item class="section-a-item" padding="horizontal-small" size="6">
                            <lightning-output-field field-name="MigrationDate__c" variant="standard"></lightning-output-field>
                        </lightning-layout-item>
                        <lightning-layout-item class="section-a-item" padding="horizontal-small" size="6">
                            <lightning-output-field field-name="AssociateCode__c" variant="standard"></lightning-output-field>
                        </lightning-layout-item>
                        <template lwc:if={visibility.migrationAssociateCode}>
                            <lightning-layout-item class="section-a-item" padding="horizontal-small" size="6">
                                <lightning-output-field field-name="MigrationAssociateCode__c" variant="standard"></lightning-output-field>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={scheduleSteps.hasSchedule}>
                            <lightning-layout-item size="12" padding="around-small">
                                <div class="schedule-wrapper" style="border:1px solid #d8dde6; border-radius:8px; background:#f8fbff; padding:12px;">
                                    <p class="schedule-title" style="font-weight:700; margin-bottom:8px;">簡易スケジュール</p>
                                    <div class="schedule-flow" style="display:flex; flex-wrap:nowrap; align-items:stretch; overflow-x:auto; padding-bottom:4px;" role="list" aria-label="簡易スケジュール">
                                        <template for:each={scheduleSteps.steps} for:item="step">
                                            <div key={step.id} class={step.itemClass} role="listitem" style={step.itemStyle}>
                                                <p class="schedule-deadline" style="font-size:12px; color:#31465d; margin-bottom:2px; line-height:1.2;">{step.deadlineLabel}</p>
                                                <p class="schedule-task" style="font-size:13px; font-weight:700; color:#1f2d3d; margin-bottom:2px; line-height:1.3;">{step.label}</p>
                                                <p class="schedule-date" style="font-size:12px; color:#425b76; line-height:1.2;">{step.dateLabel}</p>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </lightning-layout-item>
                        </template>
                    </lightning-layout>
                </lightning-accordion-section>
                <template lwc:if={hasReferenceMaterials}>
                    <lightning-accordion-section name="R" label="参考資料">
                        <div class="slds-p-horizontal_small slds-p-vertical_x-small">
                            <ul class="slds-list_dotted">
                                <template for:each={referenceMaterials} for:item="material">
                                    <li key={material.url} class="slds-m-bottom_small">
                                        <div class="slds-text-title_bold">{material.title}</div>
                                        <lightning-formatted-url value={material.url} label={material.url} target="_blank"></lightning-formatted-url>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </lightning-accordion-section>
                </template>
                <lightning-accordion-section name="B" label="移行対象データ(オブジェクト)">
                    <lightning-layout multiple-rows="true">
                        <lightning-layout-item padding="horizontal-small" size="12">
                            <div class="slds-m-bottom_x-small">
                                <lightning-button label="確認事項をすべて開く" onclick={handleOpenAll}></lightning-button>
                                <lightning-button label="確認事項をすべて閉じる" onclick={handleCloseAll} class="slds-m-left_x-small"></lightning-button>
                            </div>
                        </lightning-layout-item>
                        <template lwc:if={visibility.existingContractCustomerNotes}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <div style="display:flex; align-items:center; gap:4px;">
                                    <lightning-input type="checkbox" label="既契約者の顧客注意事項" checked={existingContractCustomerNotes} disabled></lightning-input>
                                    <template lwc:if={displayMessages.existingContractCustomerNotes.hasContent}>
                                        <lightning-button-icon
                                            icon-name={messageToggleIcons.existingContractCustomerNotes}
                                            variant="border"
                                            size="small"
                                            data-key="existingContractCustomerNotes"
                                            onclick={handleMessageToggle}
                                            alternative-text="注意事項を表示">
                                        </lightning-button-icon>
                                    </template>
                                </div>
                            </lightning-layout-item>
                            <template lwc:if={messageOpenFlags.existingContractCustomerNotes}>
                                <lightning-layout-item size="12" padding="around-small">
                                    <div class="slds-box slds-theme_shade">
                                        <ul class="slds-list_dotted">
                                            <template for:each={displayMessages.existingContractCustomerNotes.messages} for:item="message">
                                                <li key={message.id} class="slds-m-bottom_x-small">
                                                    <template lwc:if={message.text}>
                                                        <lightning-formatted-text value={message.text}></lightning-formatted-text>
                                                    </template>
                                                </li>
                                            </template>
                                        </ul>
                                    </div>
                                </lightning-layout-item>
                            </template>
                        </template>
                        <template lwc:if={visibility.individual}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <div style="display:flex; align-items:center; gap:4px;">
                                    <lightning-input type="checkbox" label="白地顧客及び白地顧客の顧客注意事項" checked={individual} disabled></lightning-input>
                                    <template lwc:if={displayMessages.individual.hasContent}>
                                        <lightning-button-icon
                                            icon-name={messageToggleIcons.individual}
                                            variant="border"
                                            size="small"
                                            data-key="individual"
                                            onclick={handleMessageToggle}
                                            alternative-text="注意事項を表示">
                                        </lightning-button-icon>
                                    </template>

                            <template lwc:if={messageOpenFlags.individual}>

                                                        <lightning-formatted-text value={message.text}></lightning-formatted-text>
                                                    </template>
                                                    <template lwc:if={message.img}>
                                                        <div class="image-container slds-m-top_small">
                                                            <img src={message.img} alt="説明画像" class="migration-hint-image"/>
                                                        </div>
                                                    </template>
                                                </li>
                                            </template>
                                        </ul>
                                    </div>
                                </lightning-layout-item>
                            </template>
                        </template>
                        <template lwc:if={visibility.masterGroupCustomerNotes}>

                                <div style="display:flex; align-items:center; gap:4px;">
                                    <lightning-input type="checkbox" label="マスタ団体の顧客注意事項" checked={masterGroupCustomerNotes} disabled></lightning-input>

                            </lightning-layout-item>
                            <template lwc:if={messageOpenFlags.masterGroupCustomerNotes}>

                                        <ul class="slds-list_dotted">
                                            <template for:each={displayMessages.masterGroupCustomerNotes.messages} for:item="message">
                                                <li key={message.id} class="slds-m-bottom_x-small">
                                                    <template lwc:if={message.text}>
                                                        <lightning-formatted-text value={message.text}></lightning-formatted-text>

                        <template lwc:if={visibility.user}>

                            </lightning-layout-item>

                        <template lwc:if={visibility.recordTypeMaster}>

                        <template lwc:if={visibility.childGroupOnly}>

                        </template>
                        <template lwc:if={visibility.household}>

                                <div style="display:flex; align-items:center; gap:4px;">
                                    <lightning-input type="checkbox" label="世帯" checked={household} disabled></lightning-input>
                                    <template lwc:if={displayMessages.household.hasContent}>
                                        <lightning-button-icon

                                            size="small"

                        <template lwc:if={visibility.customerNotes}>

                        <template lwc:if={visibility.campaignMember}>

                                <div style="display:flex; align-items:center; gap:4px;">
                                    <lightning-input type="checkbox" label="対応" checked={event} disabled></lightning-input>
                                    <template lwc:if={displayMessages.event.hasContent}>
                                        <lightning-button-icon
                                            icon-name={messageToggleIcons.event}
                                            variant="border"
                                            size="small"
                                            data-key="event"
                                            onclick={handleMessageToggle}
                                            alternative-text="注意事項を表示">
                                        </lightning-button-icon>
                                    </template>
                                </div>
                            </lightning-layout-item>
                            <template lwc:if={messageOpenFlags.event}>
                                <lightning-layout-item size="12" padding="around-small">
                                    <div class="slds-box slds-theme_shade">
                                        <ul class="slds-list_dotted">
                                            <template for:each={displayMessages.event.messages} for:item="message">
                                                <li key={message.id} class="slds-m-bottom_x-small">
                                                    <template lwc:if={message.text}>
                                                        <lightning-formatted-text value={message.text}></lightning-formatted-text>
                                                    </template>
                                                </li>
                                            </template>
                                        </ul>
                                    </div>
                                </lightning-layout-item>
                            </template>
                        </template>
                        <template lwc:if={visibility.texttemplate}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="テキストテンプレート" checked={texttemplate} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={visibility.task}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="タスク" checked={task} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={visibility.attachmentDoc}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="添付書類" checked={attachmentDoc} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={visibility.planningTargetClassification}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="募集企画対象者区分マスタ" checked={planningTargetClassification} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={visibility.agencyContactMaster}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="所属部署マスタ" checked={agencyContactMaster} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={visibility.targetManagement}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="目標" checked={targetManagement} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={visibility.contact}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="取引先責任者" checked={contact} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={visibility.status}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="主契約ステータス" checked={status} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={visibility.product2}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="商品" checked={product2} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={visibility.productCommissionPercent}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="商品手数料率" checked={productCommissionPercent} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={visibility.analyticsPermissionMaster}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="Analytics権限マスタ" checked={analyticsPermissionMaster} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={visibility.contentDocumentLink}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="ContentDocumentLink" checked={contentDocumentLink} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={visibility.contentVersion}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="ContentVersion" checked={contentVersion} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                        <template lwc:if={visibility.cksDesignDocumentDivision}>
                            <lightning-layout-item padding="horizontal-small" size="12">
                                <lightning-input type="checkbox" label="設計書区分マスタ" checked={cksDesignDocumentDivision} disabled></lightning-input>
                            </lightning-layout-item>
                        </template>
                    </lightning-layout>
                </lightning-accordion-section>

                <lightning-accordion-section name="C" label="システム情報">
                    <lightning-layout multiple-rows="true">
                        <lightning-layout-item padding="horizontal-small" size="6">
                            <lightning-output-field field-name="CreatedById" variant="standard"></lightning-output-field>
                        </lightning-layout-item>
                        <lightning-layout-item padding="horizontal-small" size="6">
                            <lightning-output-field field-name="LastModifiedById" variant="standard"></lightning-output-field>
                        </lightning-layout-item>
                        <lightning-layout-item padding="horizontal-small" size="6">
                            <lightning-output-field field-name="CreatedDate" variant="standard"></lightning-output-field>
                        </lightning-layout-item>
                        <lightning-layout-item padding="horizontal-small" size="6">
                            <lightning-output-field field-name="LastModifiedDate" variant="standard"></lightning-output-field>
                        </lightning-layout-item>                        
                    </lightning-layout>
                </lightning-accordion-section>
            </lightning-accordion>
        </lightning-record-edit-form>
    </template>
    <template lwc:else>
        <lightning-card>
            <div class="slds-text-align_center">
                <lightning-formatted-text value="レコードは削除されています"></lightning-formatted-text>
            </div>
        </lightning-card>
    </template>
</template>
